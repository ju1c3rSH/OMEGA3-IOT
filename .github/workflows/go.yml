name: OMEGA Build and Release

permissions:
  contents: write
  packages: write

on:
  push:
    branches:  [ "master" ]
  
    # pull_request:   
  #   branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.5'

    - name: Test
      run: go test -v ./...

    - name: Build
      run: |
        VERSION=$(date +%Y%m%d%H%M%S)
        # Linux amd64,injects the version info
        GOOS=linux GOARCH=amd64 go build \
          -o OMEGA3-IOT-$VERSION \
          -ldflags="-w -s -X main.Version=$VERSION" \
          ./main.go
        # create a soft link of latest to make sure the server could download the latest version
        ln -sf OMEGA3-IOT-$VERSION my-iot-server-latest
        ls -la OMEGA3-IOT-*

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          my-iot-server-*
        body: |
          Auto build from commit ${{ github.sha }}
          Version: ${{ github.run_number }}
