database:
  mysqldsn: "OMEGA3:OMEGA#@tcp(lorelei.lat:46578)/OMEGA3?charset=utf8mb4&parseTime=True&loc=Local"

server:
  port: 27015
  tls_enabled: false
  cert_file: ""     # 留空则自动生成自签名证书
  key_file: ""      # 留空则自动生成自签名证书

IoTDB:
  host: "lorelei.lat"
  port: 6667
  username: root
  password: root
  queryTimeoutMs: 4000
  pool:
    maxConnections: 5
    timeout: 60000
    fetchMetadataAuto: false

redis:
  host: lorelei.lat
  port: 22251
  password: ""
  db: 0

device_presence:
  offline_timeout_sec: 300    # 设备无消息超过 300 秒判定离线
  check_interval_sec: 60     # 后台扫描间隔 60 秒

